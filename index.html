<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recipe Finder</title>

    <link rel="stylesheet" href="rec.css">
</head>

<body>

    <!-- Login Screen -->
    <section id="loginScreen" class="login-screen">

        <div class="login-box">

            <h1>Recipe Finder</h1>

            <p>Please log in to continue.</p>

            <input
                type="text"
                id="username"
                placeholder="Username"
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
            >

            <button type="button" onclick="login()">
                Login
            </button>

            <p class="hint">
                Enter any username and password.
            </p>

        </div>

    </section>


    <!-- Main Website -->
    <section id="websiteContent" class="website-content">

        <header>

            <div class="header-text">

                <h1>Recipe Finder</h1>

                <p>
                    Search for recipes or add one of your own.
                </p>

            </div>

            <nav>

                <button
                    type="button"
                    onclick="location.href='Support.html'"
                >
                    Support
                </button>

                <button
                    type="button"
                    onclick="logout()"
                >
                    Logout
                </button>

            </nav>

        </header>


        <main>

            <!-- Search Section -->
            <section class="search-section">

                <h2>Search Recipes</h2>

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by recipe name or ingredient"
                >

            </section>


            <!-- Add Recipe Section -->
            <section class="form-section">

                <h2>Add Your Own Recipe</h2>

                <label for="recipeName">
                    Recipe Name
                </label>

                <input
                    type="text"
                    id="recipeName"
                    placeholder="Example: Chocolate Cake"
                >


                <label for="ingredients">
                    Ingredients
                </label>

                <textarea
                    id="ingredients"
                    placeholder="List the ingredients"
                ></textarea>


                <label for="instructions">
                    Instructions
                </label>

                <textarea
                    id="instructions"
                    placeholder="Explain how to prepare the recipe"
                ></textarea>


                <button
                    type="button"
                    onclick="addRecipe()"
                >
                    Add Recipe
                </button>

            </section>


            <!-- Recipe List -->
            <section class="recipes-section">

                <h2>Recipes</h2>

                <div
                    id="recipeList"
                    class="recipe-list"
                ></div>

            </section>

        </main>

    </section>


    <script src="rec.js"></script>

</body>
</html>
